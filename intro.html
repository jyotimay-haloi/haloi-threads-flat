<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Haloi Threads</title>
    <link rel="stylesheet" href="design-system.css">
    <style>
        /* ── LOCK BODY DURING INTRO ── */
        html, body {
            overflow: hidden;
            height: 100%;
        }

        /* ── FULL SCREEN INTRO ── */
        #intro-page {
            position: fixed;
            inset: 0;
            background: var(--bg-void);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* ── LOOM LINES (vertical light streaks) ── */
        .intro-loom-lines {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        .loom-line {
            position: absolute; top: -100%;
            width: 1px; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,.07), transparent);
            animation: loomPass 4s infinite linear;
        }
        .loom-line:nth-child(1){ left:15%; animation-duration:3s;   animation-delay:0s;   }
        .loom-line:nth-child(2){ left:35%; animation-duration:5s;   animation-delay:1s;   }
        .loom-line:nth-child(3){ left:55%; animation-duration:3.5s; animation-delay:.5s;  }
        .loom-line:nth-child(4){ left:75%; animation-duration:4.5s; animation-delay:1.5s; }
        .loom-line:nth-child(5){ left:90%; animation-duration:3.8s; animation-delay:2.2s; }
        @keyframes loomPass {
            0%   { top: -100%; opacity: 0; }
            20%  { opacity: 1; }
            80%  { opacity: 1; }
            100% { top: 100%;  opacity: 0; }
        }

        /* ── GRAIN TEXTURE OVERLAY ── */
        .grain-overlay {
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            opacity: 0.4;
        }

        /* ── CONTENT LAYOUT ── */
        .intro-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(14px, 2.5vh, 26px);
            /* push slightly above center for visual weight */
            margin-top: -10vh;
        }

        /* ── ORIGIN EYEBROW ── */
        .intro-origin {
            font-size: clamp(.52rem, 1vw, .64rem);
            text-transform: uppercase;
            letter-spacing: .38em;
            color: var(--text-secondary);
            opacity: 0;
            animation: fadeInUp .9s 0.4s var(--ease-luxury) forwards;
        }

        /* ── BRAND NAME ── */
        .intro-brand {
            font-size: clamp(2.6rem, 8vw, 6.4rem);
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-primary);
            letter-spacing: .06em;
            line-height: 1;
            opacity: 0;
            filter: blur(20px);
            animation: introBrandReveal 1.8s 0.2s var(--ease-luxury) forwards;
        }

        /* ── MUGA GOLD RULE ── */
        .intro-rule {
            width: 0;
            height: 1px;
            background: var(--accent-muga);
            opacity: 0;
            animation: introRuleDraw 1s 1.9s var(--ease-luxury) forwards;
        }

        /* ── TAGLINE LINES ── */
        .intro-tagline {
            opacity: 0;
            transform: translateY(10px);
            animation: introTaglineFade 1.1s 2.7s var(--ease-luxury) forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .intro-tagline span {
            display: block;
            font-size: clamp(.58rem, 1.1vw, .72rem);
            text-transform: uppercase;
            letter-spacing: .3em;
            color: var(--accent-muga);
            line-height: 1.7;
            text-align: center;
        }

        /* ── ENTER BUTTON ── */
        .intro-enter-btn {
            opacity: 0;
            animation: fadeInUp .9s 3.8s var(--ease-luxury) forwards;
            margin-top: clamp(20px, 4vh, 40px);
            padding: 14px 50px;
            border: 1px solid rgba(255,255,255,.18);
            font-size: .68rem;
            text-transform: uppercase;
            letter-spacing: .28em;
            color: #fff;
            background: transparent;
            cursor: pointer;
            font-family: var(--font);
            position: relative;
            overflow: hidden;
            transition: color .45s ease;
        }
        .intro-enter-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent-muga);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform .5s var(--ease-luxury);
            z-index: -1;
        }
        .intro-enter-btn:hover { color: #000; }
        .intro-enter-btn:hover::before { transform: scaleX(1); }

        /* ── BOTTOM YEAR ── */
        .intro-year {
            position: absolute;
            bottom: clamp(24px, 5vh, 50px);
            left: 50%;
            transform: translateX(-50%);
            font-size: .56rem;
            text-transform: uppercase;
            letter-spacing: .4em;
            color: rgba(255,255,255,.14);
            opacity: 0;
            animation: fadeInUp .8s 3.5s var(--ease-luxury) forwards;
            white-space: nowrap;
        }

        /* ── KEYFRAMES ── */
        @keyframes introBrandReveal {
            0%   { opacity: 0; filter: blur(20px); transform: scale(.97); }
            60%  { opacity: 1; filter: blur(0);    transform: scale(1);   }
            100% { opacity: 1; filter: blur(0);    transform: scale(1);   }
        }
        @keyframes introRuleDraw {
            0%   { width: 0;   opacity: 0; }
            30%  { opacity: .7; }
            100% { width: clamp(100px, 18vw, 240px); opacity: .6; }
        }
        @keyframes introTaglineFade {
            0%   { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0);    }
        }
        @keyframes fadeInUp {
            0%   { opacity: 0; transform: translateY(12px) translateX(0); }
            100% { opacity: 1; transform: translateY(0)    translateX(0); }
        }

        /* For .intro-year which has translateX(-50%) already */
        .intro-year {
            animation: fadeInUpYear .8s 3.5s var(--ease-luxury) forwards;
        }
        @keyframes fadeInUpYear {
            0%   { opacity: 0; }
            100% { opacity: 1; }
        }

        /* ── PAGE EXIT TRANSITION ── */
        #intro-page.exit {
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.2s var(--ease-luxury);
        }

        /* ── MOBILE ── */
        @media (max-width: 480px) {
            .intro-brand { font-size: clamp(2rem, 11vw, 3.2rem); }
            .intro-tagline span { letter-spacing: .2em; font-size: .6rem; }
            .intro-enter-btn { padding: 13px 36px; font-size: .64rem; letter-spacing: .22em; }
        }
    </style>
</head>
<body>

    <!-- ── THREAD PULSE ── -->
    <div class="central-thread"><div class="thread-pulse"></div></div>

    <!-- ── INTRO PAGE ── -->
    <div id="intro-page">
        <div class="grain-overlay"></div>
        <div class="intro-loom-lines">
            <div class="loom-line"></div>
            <div class="loom-line"></div>
            <div class="loom-line"></div>
            <div class="loom-line"></div>
            <div class="loom-line"></div>
        </div>

        <div class="intro-content">
            <span class="intro-origin">Est. 2026 · Assam, India</span>
            <div class="intro-brand">Haloi Threads</div>
            <div class="intro-rule"></div>
            <div class="intro-tagline">
                <span>Born in Assam. Worn by the intentional.</span>
                <span>Precision over noise. Silence over statements.</span>
            </div>
            <button class="intro-enter-btn" id="btn-enter" onclick="enterSite()">Enter</button>
        </div>

        <span class="intro-year">Season 01 · 2026</span>
    </div>

    <script>
    /*
     * INTRO LOGIC — "show once per browser visit" system
     *
     * sessionStorage holds the flag for the current browser TAB session.
     * sessionStorage is automatically cleared when:
     *   — the tab is closed
     *   — the browser window is closed
     * So revisiting the URL (new tab / new window) = shows intro again.
     * Navigating within the site = skips intro (flag persists in session).
     */
    function enterSite() {
        // Mark this session as "intro already seen"
        sessionStorage.setItem('ht_intro_seen', '1');

        const page = document.getElementById('intro-page');
        page.classList.add('exit');

        // After fade, redirect to index
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 1200);
    }

    // Optional: auto-enter after 6 seconds if user doesn't click
    setTimeout(() => {
        const btn = document.getElementById('btn-enter');
        if (btn) btn.click();
    }, 6000);
    </script>
</body>
</html>
